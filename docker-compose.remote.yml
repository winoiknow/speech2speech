services:
  s2s-remote:
    build:
      context: .
      dockerfile: Dockerfile.remote
    ports:
      - "8765:8765"
    environment:
      # ── STT (Whisper-compatible /v1/audio/transcriptions) ──────────────
      STT_OPENAI_BASE_URL: ${STT_OPENAI_BASE_URL:-http://host.docker.internal:8000}
      STT_OPENAI_API_KEY: ${STT_OPENAI_API_KEY:-sk-unused}
      STT_OPENAI_MODEL: ${STT_OPENAI_MODEL:-Systran/faster-whisper-large-v3}
      STT_OPENAI_LANGUAGE: ${STT_OPENAI_LANGUAGE:-en}

      # ── TTS source toggle: "openai-remote" (default, F5 /stream) or "elevenlabs" ──
      TTS_SOURCE: ${TTS_SOURCE:-openai-remote}

      # ── TTS: openai-remote (F5-TTS streaming /v1/audio/speech/stream) ──
      TTS_OPENAI_BASE_URL: ${TTS_OPENAI_BASE_URL:-http://host.docker.internal:8880}
      TTS_OPENAI_API_KEY: ${TTS_OPENAI_API_KEY:-sk-unused}
      TTS_OPENAI_VOICE: ${TTS_OPENAI_VOICE:-default}
      TTS_OPENAI_MODEL: ${TTS_OPENAI_MODEL:-tts-1}

      # ── TTS: elevenlabs (used when TTS_SOURCE=elevenlabs; read from env) ──
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-}
      ELEVENLABS_MODEL_ID: ${ELEVENLABS_MODEL_ID:-eleven_flash_v2_5}
      # pcm_16000 (no resample, needs paid tier) or ulaw_8000 (free-tier friendly)
      ELEVENLABS_OUTPUT_FORMAT: ${ELEVENLABS_OUTPUT_FORMAT:-pcm_16000}

      # ── TTS: minimax (used when TTS_SOURCE=minimax; WebSocket, pcm@16k, voice clone) ──
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_VOICE_ID: ${MINIMAX_VOICE_ID:-}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-speech-02-turbo}
      MINIMAX_WS_URL: ${MINIMAX_WS_URL:-wss://api.minimax.io/ws/v1/t2a_v2}
      MINIMAX_GROUP_ID: ${MINIMAX_GROUP_ID:-}

      # ── LLM (Hermes /v1/responses or /v1/chat/completions) ─────────────
      RESPONSES_API_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      RESPONSES_API_API_KEY: ${LLM_API_KEY:-sk-unused}
      LLM_MODEL: ${LLM_MODEL:-hermes-agent}
      # Sentences accumulated before the first TTS batch fires. Lower = lower
      # time-to-first-audio. A/B this (1 vs 2 vs 3) for the latency test.
      STREAM_BATCH_SENTENCES: ${STREAM_BATCH_SENTENCES:-3}

      # ── Server authentication ──────────────────────────────────────────
      SERVER_API_KEY: ${SERVER_API_KEY:-}

      # ── General ────────────────────────────────────────────────────────
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Re-enable verbose diagnostics (VAD heartbeat, drop/TTS timing logs)
      DEBUG_MODE: ${DEBUG_MODE:-off}
      # Acoustic echo cancellation on the input path (off by default)
      AEC_ENABLED: ${AEC_ENABLED:-0}
      AEC_BACKEND: ${AEC_BACKEND:-aec3}
      AEC_FILTER_LENGTH_MS: ${AEC_FILTER_LENGTH_MS:-250}
      # Reject mic chunks whose RAW RMS is below this before the VAD decides
      # (kills phantom barge-ins on echo leaks; tune via DEBUG_MODE 'maxpass').
      # 0 disables. See vad_arguments.
      VAD_INPUT_RMS_GATE: ${VAD_INPUT_RMS_GATE:-100}

      # ── End-of-turn: "vad" (silence timer) or "smart_turn" (Smart Turn v3) ──
      # smart_turn = content/prosody-aware semantic endpointing; no mid-thought cutoffs.
      TURN_DETECTION: ${TURN_DETECTION:-vad}
      TURN_MIN_SILENCE_MS: ${TURN_MIN_SILENCE_MS:-300}
      TURN_MAX_S: ${TURN_MAX_S:-30}
      SMART_TURN_THRESHOLD: ${SMART_TURN_THRESHOLD:-0.5}
      # Finalize a held "incomplete" turn after this much silence (don't-hang net,
      # NOT a turn timer — must sit above a thinking pause or it cuts the user off).
      TURN_HOLD_GRACE_MS: ${TURN_HOLD_GRACE_MS:-3000}
      SMART_TURN_MODEL_PATH: ${SMART_TURN_MODEL_PATH:-/app/models/smart-turn-v3.2-cpu.onnx}
      # Explicit ONNX intra-op threads (avoids container-cpuset affinity errors).
      SMART_TURN_NUM_THREADS: ${SMART_TURN_NUM_THREADS:-2}
    command:
      - "--mode"
      - "realtime"
      - "--stt"
      - "openai-remote"
      - "--tts"
      - "${TTS_SOURCE:-openai-remote}"
      - "--llm_backend"
      - "responses-api"
      - "--stt_openai_base_url"
      - "${STT_OPENAI_BASE_URL:-http://host.docker.internal:8000}"
      - "--stt_openai_api_key"
      - "${STT_OPENAI_API_KEY:-sk-unused}"
      - "--stt_openai_model"
      - "${STT_OPENAI_MODEL:-Systran/faster-whisper-large-v3}"
      - "--tts_openai_base_url"
      - "${TTS_OPENAI_BASE_URL:-http://host.docker.internal:8880}"
      - "--tts_openai_api_key"
      - "${TTS_OPENAI_API_KEY:-sk-unused}"
      - "--tts_openai_voice"
      - "${TTS_OPENAI_VOICE:-default}"
      - "--responses_api_base_url"
      - "${LLM_BASE_URL:-http://host.docker.internal:11434/v1}"
      - "--responses_api_api_key"
      - "${LLM_API_KEY:-sk-unused}"
      - "--model_name"
      - "${LLM_MODEL:-hermes-agent}"
      - "--log_level"
      - "${LOG_LEVEL:-info}"
    extra_hosts:
      # Allow container to reach services on the host machine
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
