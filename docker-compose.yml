services:
  s2s-remote:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
    environment:
      # ── STT (Whisper-compatible /v1/audio/transcriptions) ──────────────
      STT_OPENAI_BASE_URL: ${STT_OPENAI_BASE_URL:-http://host.docker.internal:8000}
      STT_OPENAI_API_KEY: ${STT_OPENAI_API_KEY:-sk-unused}
      STT_OPENAI_MODEL: ${STT_OPENAI_MODEL:-Systran/faster-whisper-large-v3}
      STT_OPENAI_LANGUAGE: ${STT_OPENAI_LANGUAGE:-en}

      # ── TTS source toggle: "openai-remote" (default, F5 /stream) or "elevenlabs" ──
      TTS_SOURCE: ${TTS_SOURCE:-openai-remote}

      # ── TTS: openai-remote (F5-TTS streaming /v1/audio/speech/stream) ──
      TTS_OPENAI_BASE_URL: ${TTS_OPENAI_BASE_URL:-http://host.docker.internal:8880}
      TTS_OPENAI_API_KEY: ${TTS_OPENAI_API_KEY:-sk-unused}
      TTS_OPENAI_VOICE: ${TTS_OPENAI_VOICE:-default}
      TTS_OPENAI_MODEL: ${TTS_OPENAI_MODEL:-tts-1}

      # ── TTS: elevenlabs (used when TTS_SOURCE=elevenlabs; read from env) ──
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-}
      ELEVENLABS_MODEL_ID: ${ELEVENLABS_MODEL_ID:-eleven_flash_v2_5}
      # pcm_16000 (no resample, needs paid tier) or ulaw_8000 (free-tier friendly)
      ELEVENLABS_OUTPUT_FORMAT: ${ELEVENLABS_OUTPUT_FORMAT:-pcm_16000}

      # ── TTS: minimax (used when TTS_SOURCE=minimax; WebSocket, pcm@16k, voice clone) ──
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_VOICE_ID: ${MINIMAX_VOICE_ID:-}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-speech-02-turbo}
      MINIMAX_WS_URL: ${MINIMAX_WS_URL:-wss://api.minimax.io/ws/v1/t2a_v2}
      MINIMAX_GROUP_ID: ${MINIMAX_GROUP_ID:-}

      # ── LLM (Hermes /v1/responses or /v1/chat/completions) ─────────────
      RESPONSES_API_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      RESPONSES_API_API_KEY: ${LLM_API_KEY:-sk-unused}
      LLM_MODEL: ${LLM_MODEL:-hermes-agent}
      # Sentences accumulated before the first TTS batch fires. Lower = lower
      # time-to-first-audio. A/B this (1 vs 2 vs 3) for the latency test.
      STREAM_BATCH_SENTENCES: ${STREAM_BATCH_SENTENCES:-3}
      # The LLM warmup round-trip runs once per process by default (warmed at
      # startup; per-session builds skip it). Set 1 to warm on every session build
      # (the old behavior) — only needed if the remote model goes cold between turns.
      S2S_LLM_WARMUP_PER_SESSION: ${S2S_LLM_WARMUP_PER_SESSION:-0}

      # ── Server authentication ──────────────────────────────────────────
      SERVER_API_KEY: ${SERVER_API_KEY:-}

      # ── Multi-session (remote profile only) ────────────────────────────
      # Concurrent realtime sessions. 1 = today's single-session behavior;
      # raise after load-testing the shared STT/TTS/LLM endpoints (LATENCY.md §7).
      # Forced back to 1 if any of STT/TTS/LLM is a local in-process model.
      S2S_MAX_SESSIONS: ${S2S_MAX_SESSIONS:-1}
      # Reap a session after this many seconds of no client traffic (0 = never).
      S2S_IDLE_TIMEOUT_S: ${S2S_IDLE_TIMEOUT_S:-0}
      # Send-loop dead-thread supervisor check period in seconds (0 = disable).
      S2S_THREAD_SUPERVISOR_S: ${S2S_THREAD_SUPERVISOR_S:-2}
      # WebSocket keepalive: server pings idle clients every INTERVAL s and closes
      # (1011) if no pong within TIMEOUT s. Generous defaults so a warm-connection
      # client can refresh infrequently and a long tool turn won't trip a false
      # 1011. Set S2S_WS_PING_INTERVAL=0 to disable server pings (client/TCP own
      # liveness — pair with a client-side keepalive).
      S2S_WS_PING_INTERVAL: ${S2S_WS_PING_INTERVAL:-20}
      S2S_WS_PING_TIMEOUT: ${S2S_WS_PING_TIMEOUT:-60}
      # Per-service caps on concurrent in-flight requests across all sessions
      # (0 = unlimited). Tune with the endpoints' own concurrency (LATENCY.md §7.3).
      STT_MAX_CONCURRENCY: ${STT_MAX_CONCURRENCY:-0}
      TTS_MAX_CONCURRENCY: ${TTS_MAX_CONCURRENCY:-0}
      LLM_MAX_CONCURRENCY: ${LLM_MAX_CONCURRENCY:-0}

      # ── General ────────────────────────────────────────────────────────
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Re-enable verbose diagnostics (VAD heartbeat, drop/TTS timing logs)
      DEBUG_MODE: ${DEBUG_MODE:-off}
      # Acoustic echo cancellation on the input path (off by default)
      AEC_ENABLED: ${AEC_ENABLED:-0}
      AEC_BACKEND: ${AEC_BACKEND:-aec3}
      AEC_FILTER_LENGTH_MS: ${AEC_FILTER_LENGTH_MS:-250}
      # Reject mic chunks whose RAW RMS is below this before the VAD decides
      # (kills phantom barge-ins on echo leaks; tune via DEBUG_MODE 'maxpass').
      # 0 disables. See vad_arguments.
      VAD_INPUT_RMS_GATE: ${VAD_INPUT_RMS_GATE:-100}
      # While the agent is SPEAKING, gate on the AEC residual at this threshold
      # instead of raw energy (raw echo can exceed the raw gate at high volume;
      # the residual still separates echo from a real barge-in). 0 disables.
      VAD_INPUT_RMS_GATE_FAR: ${VAD_INPUT_RMS_GATE_FAR:-400}
      # While the agent speaks, require sustained energy (>= MIN of the last
      # WINDOW chunks above the residual gate) to pass — rejects sparse transient
      # echo spikes that a level gate alone lets through, passes dense real speech.
      VAD_FAR_SUSTAIN_MIN: ${VAD_FAR_SUSTAIN_MIN:-6}
      VAD_FAR_SUSTAIN_WINDOW: ${VAD_FAR_SUSTAIN_WINDOW:-12}

      # ── End-of-turn: "vad" (silence timer) or "smart_turn" (Smart Turn v3) ──
      # smart_turn = content/prosody-aware semantic endpointing; no mid-thought cutoffs.
      TURN_DETECTION: ${TURN_DETECTION:-vad}
      TURN_MIN_SILENCE_MS: ${TURN_MIN_SILENCE_MS:-300}
      TURN_MAX_S: ${TURN_MAX_S:-30}
      SMART_TURN_THRESHOLD: ${SMART_TURN_THRESHOLD:-0.5}
      # Finalize a held "incomplete" turn after this much silence (don't-hang net,
      # NOT a turn timer — must sit above a thinking pause or it cuts the user off).
      TURN_HOLD_GRACE_MS: ${TURN_HOLD_GRACE_MS:-3000}
      SMART_TURN_MODEL_PATH: ${SMART_TURN_MODEL_PATH:-/app/models/smart-turn-v3.2-cpu.onnx}
      # Explicit ONNX intra-op threads (avoids container-cpuset affinity errors).
      SMART_TURN_NUM_THREADS: ${SMART_TURN_NUM_THREADS:-2}

      # ── Speaker identification (off by default) ─────────────────────────
      # When on, fires /v1/identify concurrently with STT and tags the dialogue
      # [name] on a confident match. Run the speaker-id service (below profile,
      # or its own compose) and point SPEAKER_ID_BASE_URL at it.
      SPEAKER_ID_ENABLED: ${SPEAKER_ID_ENABLED:-0}
      SPEAKER_ID_BASE_URL: ${SPEAKER_ID_BASE_URL:-http://speaker-id:9100}
      SPEAKER_ID_API_KEY: ${SPEAKER_ID_API_KEY:-}
      SPEAKER_ID_TIMEOUT: ${SPEAKER_ID_TIMEOUT:-0.8}
      SPEAKER_ID_LABEL_FORMAT: ${SPEAKER_ID_LABEL_FORMAT:-[{name}] }
      # Phase 4 (Tier 2): async conference diarization, OFF the hot path. Separate
      # flag from recognition — the corrective-event contract is inert until on.
      SPEAKER_DIARIZE_ENABLED: ${SPEAKER_DIARIZE_ENABLED:-0}
      SPEAKER_DIARIZE_TIMEOUT: ${SPEAKER_DIARIZE_TIMEOUT:-5.0}
    command:
      - "--mode"
      - "realtime"
      - "--stt"
      - "openai-remote"
      - "--tts"
      - "${TTS_SOURCE:-openai-remote}"
      - "--llm_backend"
      - "responses-api"
      - "--stt_openai_base_url"
      - "${STT_OPENAI_BASE_URL:-http://host.docker.internal:8000}"
      - "--stt_openai_api_key"
      - "${STT_OPENAI_API_KEY:-sk-unused}"
      - "--stt_openai_model"
      - "${STT_OPENAI_MODEL:-Systran/faster-whisper-large-v3}"
      - "--tts_openai_base_url"
      - "${TTS_OPENAI_BASE_URL:-http://host.docker.internal:8880}"
      - "--tts_openai_api_key"
      - "${TTS_OPENAI_API_KEY:-sk-unused}"
      - "--tts_openai_voice"
      - "${TTS_OPENAI_VOICE:-default}"
      - "--responses_api_base_url"
      - "${LLM_BASE_URL:-http://host.docker.internal:11434/v1}"
      - "--responses_api_api_key"
      - "${LLM_API_KEY:-sk-unused}"
      - "--model_name"
      - "${LLM_MODEL:-hermes-agent}"
      - "--log_level"
      - "${LOG_LEVEL:-info}"
    extra_hosts:
      # Allow container to reach services on the host machine
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── Adjacent speaker-id service (opt-in) ──────────────────────────────────
  # Owns the embedding model + speaker store + enrollment UI (kept out of the lean
  # s2s-remote image). Opt-in so the default `docker compose up` is unchanged:
  #   docker compose --profile speaker-id up   (then set SPEAKER_ID_ENABLED=1)
  # Source repo (sibling layout): ~/workspace/diarization/speaker-id. Override the
  # build context with SPEAKER_ID_BUILD_CONTEXT if your checkout differs. It also
  # runs standalone from its own compose; if you do that, just point
  # SPEAKER_ID_BASE_URL at it and skip this service.
  speaker-id:
    profiles: ["speaker-id"]
    build:
      context: ${SPEAKER_ID_BUILD_CONTEXT:-../../diarization/speaker-id}
    ports:
      - "9100:9100"
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-speechbrain/spkrec-ecapa-voxceleb}
      STORE_BACKEND: ${STORE_BACKEND:-sqlite}
      STORE_PATH: ${STORE_PATH:-/data/speakers.db}
      SIMILARITY_THRESHOLD: ${SIMILARITY_THRESHOLD:-0.65}
      AMBIGUOUS_MARGIN: ${AMBIGUOUS_MARGIN:-0.08}
    volumes:
      - speaker_data:/data
    restart: unless-stopped

volumes:
  speaker_data:
